<!-- DPM Table Selection Modal -->
<div id="dpmTableSelectionModal" class="output-layer-modal" style="display: none;">
    <div class="modal-overlay" onclick="closeDPMTableSelectionModal()"></div>
    <div class="modal-content" style="max-width: 90%; width: 1000px; max-height: 90vh;">
        <div class="modal-header" style="background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); color: white; padding: 1.5rem; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h3 style="margin: 0; font-size: 18px;">
                    <i class="fas fa-table"></i> Select DPM Tables to Import
                </h3>
            </div>
            <button class="modal-close" onclick="closeDPMTableSelectionModal()" style="background: none; border: none; color: white; font-size: 28px; cursor: pointer; padding: 0; line-height: 1;">&times;</button>
        </div>

        <div class="modal-body" style="padding: 1.5rem; height: calc(90vh - 180px); display: flex; flex-direction: column; gap: 15px; overflow-y: auto;">
            <!-- Status Banner -->
            <div id="dpm-table-selection-status" style="padding: 12px; background: #e3f2fd; border-left: 4px solid #2196f3; border-radius: 4px; font-size: 14px; color: #1976d2;">
                <i class="fas fa-info-circle"></i> <span id="dpm-table-count">Loading tables...</span>
            </div>

            <!-- Filter and Preset Section -->
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <!-- Search Filter -->
                <div style="flex: 1; min-width: 250px;">
                    <input type="text" id="dpm-table-search" placeholder="Search tables by name or code..."
                           style="width: 100%; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px;"
                           oninput="filterDPMTables()" />
                </div>

                <!-- Framework Filter -->
                <div style="min-width: 150px;">
                    <select id="dpm-framework-filter" onchange="filterDPMTables()"
                            style="width: 100%; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px;">
                        <option value="">All Frameworks</option>
                    </select>
                </div>

                <!-- Quick Actions -->
                <div style="display: flex; gap: 5px;">
                    <button onclick="selectAllDPMTables()" class="btn btn-sm btn-secondary" style="padding: 6px 12px; font-size: 13px;">
                        <i class="fas fa-check-double"></i> Select All
                    </button>
                    <button onclick="clearAllDPMTables()" class="btn btn-sm btn-secondary" style="padding: 6px 12px; font-size: 13px;">
                        <i class="fas fa-times"></i> Clear All
                    </button>
                </div>
            </div>

            <!-- Preset Management -->
            <div style="padding: 12px; background: #f8f9fa; border-radius: 4px; border: 1px solid #e2e8f0;">
                <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <label style="font-weight: 600; font-size: 14px; margin: 0;">Presets:</label>
                    <select id="dpm-preset-selector" onchange="loadDPMPreset()"
                            style="flex: 1; min-width: 200px; padding: 6px 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px;">
                        <option value="">-- Select a preset --</option>
                    </select>
                    <button onclick="saveDPMPreset()" class="btn btn-sm btn-primary" style="padding: 6px 12px; font-size: 13px;">
                        <i class="fas fa-save"></i> Save as Preset
                    </button>
                    <button onclick="deleteDPMPreset()" class="btn btn-sm btn-danger" style="padding: 6px 12px; font-size: 13px;">
                        <i class="fas fa-trash"></i> Delete Preset
                    </button>
                </div>
            </div>

            <!-- Table List -->
            <div style="flex: 1; border: 1px solid #e2e8f0; border-radius: 4px; overflow-y: auto; background: white;">
                <table id="dpm-tables-list" style="width: 100%; border-collapse: collapse;">
                    <thead style="position: sticky; top: 0; background: #f8f9fa; border-bottom: 2px solid #e2e8f0;">
                        <tr>
                            <th style="padding: 10px; text-align: left; font-size: 13px; font-weight: 600; width: 40px;">
                                <input type="checkbox" id="select-all-checkbox" onchange="toggleAllDPMTables()" />
                            </th>
                            <th style="padding: 10px; text-align: left; font-size: 13px; font-weight: 600;">Table Code</th>
                            <th style="padding: 10px; text-align: left; font-size: 13px; font-weight: 600;">Table Name</th>
                            <th style="padding: 10px; text-align: left; font-size: 13px; font-weight: 600; width: 120px;">Framework</th>
                        </tr>
                    </thead>
                    <tbody id="dpm-tables-tbody">
                        <tr>
                            <td colspan="4" style="padding: 20px; text-align: center; color: #666;">
                                <i class="fas fa-spinner fa-spin"></i> Loading tables...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Selection Summary -->
            <div id="dpm-selection-summary" style="padding: 10px; background: #f0f4f8; border-radius: 4px; font-size: 13px; color: #495057;">
                <strong>Selected:</strong> <span id="dpm-selected-count">0</span> tables
            </div>
        </div>

        <div class="modal-footer" style="padding: 1rem 1.5rem; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; border-radius: 0 0 8px 8px;">
            <div id="dpm-modal-status" style="font-size: 13px; color: #666;"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="closeDPMTableSelectionModal()" style="padding: 8px 20px;">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button class="btn btn-success" onclick="confirmDPMTableSelection()" id="dpm-confirm-button" style="padding: 8px 20px; background: #4caf50;">
                    <i class="fas fa-check"></i> Confirm Selection
                </button>
            </div>
        </div>
    </div>
</div>
