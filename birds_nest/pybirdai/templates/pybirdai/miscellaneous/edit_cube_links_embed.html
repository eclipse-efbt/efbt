<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Cube Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            background: #f8f9fa;
        }

        .filter-section {
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .filter-section h5 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .filter-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn-cancel {
            background-color: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
        }

        .cube-links-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin: 20px 0;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            overflow: hidden;
            font-size: 13px;
        }

        .cube-links-table th {
            background-color: #343a40;
            color: white;
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }

        .cube-links-table td {
            padding: 8px;
            border-bottom: 1px solid #dee2e6;
            font-size: 12px;
        }

        .cube-links-table tr:hover {
            background-color: #f8f9fa;
        }

        .cube-links-table tr:last-child td {
            border-bottom: none;
        }

        .delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .description-text {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }

        #cube-links-count {
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-add:hover {
            background-color: #218838;
        }

        .add-link-form {
            background: #f1f8e9;
            border: 1px solid #8bc34a;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }

        .add-link-form.visible {
            display: block;
        }

        .add-link-form h5 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
        }

        .form-actions {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div id="message-container"></div>

    <p class="description-text">
        Review and edit cube links for the ANCRDT transformation.
    </p>

    <!-- Filters -->
    <div class="filter-section">
        <h5>Filter Cube Links</h5>
        <div class="filter-row">
            <div class="filter-group">
                <label for="foreign-cube-filter">Foreign Cube:</label>
                <select id="foreign-cube-filter" onchange="filterCubeLinks()">
                    <option value="">All</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="join-identifier-filter">Join Identifier:</label>
                <select id="join-identifier-filter" onchange="filterCubeLinks()">
                    <option value="">All</option>
                </select>
            </div>
        </div>
        <button onclick="resetFilters()" class="btn-cancel">
            <i class="fas fa-redo"></i> Reset Filters
        </button>
    </div>

    <!-- Add New Link Button -->
    <button onclick="showAddForm()" class="btn-add">
        <i class="fas fa-plus"></i> Add New Cube Link
    </button>

    <!-- Add Link Form -->
    <div id="add-link-form" class="add-link-form">
        <h5>Add New Cube Link</h5>
        <div class="form-row">
            <div class="form-group">
                <label for="add-primary-cube">Primary Cube:</label>
                <select id="add-primary-cube" required onchange="updateCubeLinkId()">
                    <option value="">Select...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="add-foreign-cube">Foreign Cube:</label>
                <select id="add-foreign-cube" required onchange="updateCubeLinkId()">
                    <option value="">Select...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="add-join-identifier">Join Identifier:</label>
                <input type="text" id="add-join-identifier" oninput="updateCubeLinkId()">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="add-cube-link-id">Cube Link ID:</label>
                <input type="text" id="add-cube-link-id" readonly>
            </div>
            <div class="form-group">
                <label for="add-code">Code:</label>
                <input type="text" id="add-code">
            </div>
            <div class="form-group">
                <label for="add-name">Name:</label>
                <input type="text" id="add-name">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="add-description">Description:</label>
                <input type="text" id="add-description">
            </div>
            <div class="form-group">
                <label for="add-order-relevance">Order Relevance:</label>
                <input type="number" id="add-order-relevance">
            </div>
            <div class="form-group">
                <label for="add-cube-link-type">Cube Link Type:</label>
                <input type="text" id="add-cube-link-type">
            </div>
        </div>
        <div class="form-actions">
            <button onclick="addCubeLink()" class="btn-add">
                <i class="fas fa-save"></i> Add Cube Link
            </button>
            <button onclick="hideAddForm()" class="btn-cancel">Cancel</button>
        </div>
    </div>

    <!-- Cube Links Table -->
    <div id="cube-links-container">
        <table class="cube-links-table" id="cube-links-table">
            <thead>
                <tr>
                    <th>Cube Link ID</th>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Primary Cube</th>
                    <th>Foreign Cube</th>
                    <th>Join Identifier</th>
                    <th>Order</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated by AJAX -->
            </tbody>
        </table>
        <p id="cube-links-count"></p>
    </div>

    <script>
        // Get CSRF token for AJAX requests
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');

        // Cube Links Management
        function filterCubeLinks() {
            loadCubeLinks();
        }

        function loadCubeLinks() {
            const foreignCube = document.getElementById('foreign-cube-filter').value;
            const joinIdentifier = document.getElementById('join-identifier-filter').value;

            const params = new URLSearchParams();
            if (foreignCube) params.append('foreign_cube', foreignCube);
            if (joinIdentifier) params.append('join_identifier', joinIdentifier);

            const container = document.getElementById('cube-links-container');
            container.classList.add('loading');

            fetch(`/pybirdai/api/cube-links/list/?${params.toString()}&_t=${Date.now()}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    container.classList.remove('loading');
                    if (data.status === 'success') {
                        renderCubeLinksTable(data.links);
                        document.getElementById('cube-links-count').textContent = `Total: ${data.count} cube link${data.count !== 1 ? 's' : ''}`;
                    } else {
                        showMessage('Error loading cube links: ' + (data.message || 'Unknown error'), 'error');
                        renderCubeLinksTable([]);
                    }
                })
                .catch(error => {
                    container.classList.remove('loading');
                    console.error('Error loading cube links:', error);
                    showMessage('Error loading cube links: ' + error.message, 'error');
                    renderCubeLinksTable([]);
                });
        }

        function renderCubeLinksTable(links) {
            const tbody = document.querySelector('#cube-links-table tbody');
            tbody.innerHTML = '';

            if (links.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px; color: #666;">No cube links found. Try adjusting the filters.</td></tr>';
                return;
            }

            links.forEach(link => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${link.cube_link_id || ''}</td>
                    <td>${link.code || '-'}</td>
                    <td>${link.name || '-'}</td>
                    <td>${link.primary_cube_id || '-'}</td>
                    <td>${link.foreign_cube_id || '-'}</td>
                    <td>${link.join_identifier || '-'}</td>
                    <td>${link.order_relevance !== null ? link.order_relevance : '-'}</td>
                    <td>
                        <button class="delete-btn" data-cube-link-id="${link.cube_link_id || ''}">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                `;
                // Add click handler to the delete button
                const deleteBtn = row.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', function() {
                    deleteCubeLink(this.getAttribute('data-cube-link-id'));
                });
                tbody.appendChild(row);
            });
        }

        function resetFilters() {
            document.getElementById('foreign-cube-filter').value = '';
            document.getElementById('join-identifier-filter').value = '';
            loadCubeLinks();
        }

        function deleteCubeLink(cubeLinkId) {
            if (!confirm('Are you sure you want to delete this cube link?')) {
                return;
            }

            fetch(`/pybirdai/delete-cube-link/${encodeURIComponent(cubeLinkId)}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken,
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showMessage(data.message, 'success');
                    loadCubeLinks();
                    // Notify parent to refresh other iframes (cascading delete affects structure/member links)
                    window.parent.postMessage({
                        type: 'cubelink-deleted',
                        cubeLinkId: cubeLinkId
                    }, '*');
                } else {
                    showMessage('Error: ' + data.message, 'error');
                }
            })
            .catch(error => {
                console.error('Error deleting cube link:', error);
                showMessage('Error deleting cube link', 'error');
            });
        }

        function showMessage(message, type) {
            const messageContainer = document.getElementById('message-container');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            messageContainer.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }

        // Add Form Management
        function showAddForm() {
            document.getElementById('add-link-form').classList.add('visible');
            loadCubesForForm();
        }

        function hideAddForm() {
            document.getElementById('add-link-form').classList.remove('visible');
            // Reset form
            document.getElementById('add-primary-cube').value = '';
            document.getElementById('add-foreign-cube').value = '';
            document.getElementById('add-join-identifier').value = '';
            document.getElementById('add-cube-link-id').value = '';
            document.getElementById('add-code').value = '';
            document.getElementById('add-name').value = '';
            document.getElementById('add-description').value = '';
            document.getElementById('add-order-relevance').value = '';
            document.getElementById('add-cube-link-type').value = '';
        }

        function loadCubesForForm() {
            fetch('/pybirdai/api/cube-links/cubes/')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const primarySelect = document.getElementById('add-primary-cube');
                        const foreignSelect = document.getElementById('add-foreign-cube');

                        // Populate both dropdowns
                        [primarySelect, foreignSelect].forEach(select => {
                            select.innerHTML = '<option value="">Select...</option>';
                            data.cubes.forEach(cube => {
                                const option = document.createElement('option');
                                option.value = cube;
                                option.textContent = cube;
                                select.appendChild(option);
                            });
                        });
                    } else {
                        showMessage('Error loading cubes: ' + (data.message || 'Unknown error'), 'error');
                    }
                })
                .catch(error => {
                    console.error('Error loading cubes:', error);
                    showMessage('Error loading cubes', 'error');
                });
        }

        function updateCubeLinkId() {
            const primaryCube = document.getElementById('add-primary-cube').value;
            const foreignCube = document.getElementById('add-foreign-cube').value;
            const joinIdentifier = document.getElementById('add-join-identifier').value;

            const cubeLinkId = `${foreignCube}:${primaryCube}:${joinIdentifier}`;
            document.getElementById('add-cube-link-id').value = cubeLinkId;
        }

        function addCubeLink() {
            const formData = new FormData();
            formData.append('primary_cube_id', document.getElementById('add-primary-cube').value);
            formData.append('foreign_cube_id', document.getElementById('add-foreign-cube').value);
            formData.append('join_identifier', document.getElementById('add-join-identifier').value);
            formData.append('code', document.getElementById('add-code').value);
            formData.append('name', document.getElementById('add-name').value);
            formData.append('description', document.getElementById('add-description').value);
            formData.append('order_relevance', document.getElementById('add-order-relevance').value);
            formData.append('cube_link_type', document.getElementById('add-cube-link-type').value);

            // Validate required fields
            if (!formData.get('primary_cube_id') || !formData.get('foreign_cube_id')) {
                showMessage('Primary cube and foreign cube are required', 'error');
                return;
            }

            fetch('/pybirdai/api/cube-links/add/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showMessage(data.message, 'success');
                    hideAddForm();
                    loadCubeLinks();
                } else {
                    showMessage('Error: ' + data.message, 'error');
                }
            })
            .catch(error => {
                console.error('Error adding cube link:', error);
                showMessage('Error adding cube link', 'error');
            });
        }

        // Load filter options dynamically
        function loadFilterOptions() {
            // Fetch distinct foreign cubes and join identifiers from API
            fetch('/pybirdai/api/cube-links/filter-options/')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // Populate foreign cube filter
                        const foreignCubeFilter = document.getElementById('foreign-cube-filter');
                        foreignCubeFilter.innerHTML = '<option value="">All</option>';
                        data.foreign_cubes.forEach(cube => {
                            const option = document.createElement('option');
                            option.value = cube;
                            option.textContent = cube;
                            foreignCubeFilter.appendChild(option);
                        });

                        // Populate join identifier filter
                        const joinIdentifierFilter = document.getElementById('join-identifier-filter');
                        joinIdentifierFilter.innerHTML = '<option value="">All</option>';
                        data.join_identifiers.forEach(identifier => {
                            const option = document.createElement('option');
                            option.value = identifier;
                            option.textContent = identifier;
                            joinIdentifierFilter.appendChild(option);
                        });
                    } else {
                        console.warn('No filter options available:', data.message || 'Unknown error');
                    }
                })
                .catch(error => {
                    console.error('Error loading filter options:', error);
                    showMessage('Unable to load filter options. They may be empty.', 'error');
                });
        }

        // Load cube links on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadFilterOptions();
            loadCubeLinks();
        });
    </script>
</body>
</html>
