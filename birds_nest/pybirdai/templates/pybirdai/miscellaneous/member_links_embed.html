<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Member Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            background: #f8f9fa;
        }

        .filter-section {
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .filter-section h5 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .filter-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-add:hover {
            background-color: #218838;
        }

        .btn-cancel {
            background-color: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
        }

        .add-link-form {
            background: #f1f8e9;
            border: 1px solid #8bc34a;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            display: none;
        }

        .add-link-form.visible {
            display: block;
        }

        .add-link-form h5 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
        }

        .member-links-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin: 20px 0;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            overflow: hidden;
        }

        .member-links-table th {
            background-color: #343a40;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        .member-links-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #dee2e6;
            font-size: 14px;
        }

        .member-links-table tr:hover {
            background-color: #f8f9fa;
        }

        .member-links-table tr:last-child td {
            border-bottom: none;
        }

        .delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .description-text {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }

        #member-links-count {
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="message-container"></div>

    <p class="description-text">
        Review and edit member links for the ANCRDT transformation.
    </p>

    <!-- Filters -->
    <div class="filter-section">
        <h5>Filter Member Links</h5>
        <div class="filter-row">
            <div class="filter-group">
                <label for="cube-link-filter">Cube Structure Item Link:</label>
                <select id="cube-link-filter" onchange="filterMemberLinks()">
                    <option value="">All</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="primary-member-filter">Primary Member:</label>
                <select id="primary-member-filter" onchange="loadMemberLinks()" disabled>
                    <option value="">All</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="foreign-member-filter">Foreign Member:</label>
                <select id="foreign-member-filter" onchange="loadMemberLinks()" disabled>
                    <option value="">All</option>
                </select>
            </div>
        </div>
        <button onclick="resetFilters()" class="btn-cancel">
            <i class="fas fa-redo"></i> Reset Filters
        </button>
    </div>

    <!-- Add New Link Button -->
    <button onclick="showAddForm()" class="btn-add">
        <i class="fas fa-plus"></i> Add New Member Link
    </button>

    <!-- Add Link Form -->
    <div id="add-link-form" class="add-link-form">
        <h5>Add New Member Link</h5>
        <div class="form-row">
            <div class="form-group">
                <label for="add-cube-link">Cube Structure Item Link:</label>
                <select id="add-cube-link" required onchange="updateAddFormMembers()">
                    <option value="">Select...</option>
                    {% for link in all_cube_structure_item_links %}
                    <option value="{{ link.cube_structure_item_link_id }}">{{ link.cube_structure_item_link_id }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="add-primary-member">Primary Member:</label>
                <select id="add-primary-member" required>
                    <option value="">Select...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="add-foreign-member">Foreign Member:</label>
                <select id="add-foreign-member" required>
                    <option value="">Select...</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>
                    <input type="checkbox" id="add-is-linked" checked>
                    Is Linked
                </label>
            </div>
            <div class="form-group">
                <label for="add-valid-from">Valid From:</label>
                <input type="datetime-local" id="add-valid-from">
            </div>
            <div class="form-group">
                <label for="add-valid-to">Valid To:</label>
                <input type="datetime-local" id="add-valid-to">
            </div>
        </div>
        <div class="form-actions">
            <button onclick="addMemberLink()" class="btn-add">
                <i class="fas fa-save"></i> Add Member Link
            </button>
            <button onclick="hideAddForm()" class="btn-cancel">Cancel</button>
        </div>
    </div>

    <!-- Member Links Table -->
    <div id="member-links-container">
        <table class="member-links-table" id="member-links-table">
            <thead>
                <tr>
                    <th>Cube Structure Item Link</th>
                    <th>Primary Member</th>
                    <th>Foreign Member</th>
                    <th>Is Linked</th>
                    <th>Valid From</th>
                    <th>Valid To</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated by AJAX -->
            </tbody>
        </table>
        <p id="member-links-count"></p>
    </div>

    <script>
        // Get CSRF token for AJAX requests
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');

        // Member Links Management
        function filterMemberLinks() {
            const cubeLinkSelect = document.getElementById('cube-link-filter');
            const cubeLinkId = cubeLinkSelect.value;
            const primaryMemberFilter = document.getElementById('primary-member-filter');
            const foreignMemberFilter = document.getElementById('foreign-member-filter');

            // When cube link changes, update member filter dropdowns and reload table
            if (cubeLinkId) {
                // Enable member filters
                primaryMemberFilter.disabled = false;
                foreignMemberFilter.disabled = false;

                // Reload table immediately with cube link filter
                loadMemberLinks();

                // Fetch member options in background
                fetch(`/pybirdai/api/member-links/related-members/${cubeLinkId}/`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            // Update filter dropdowns
                            updateMemberDropdown('primary-member-filter', data.primary_members, true);
                            updateMemberDropdown('foreign-member-filter', data.foreign_members, true);
                        } else {
                            showMessage('Error loading filter options: ' + (data.message || 'Unknown error'), 'error');
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching related members:', error);
                        showMessage('Error loading filter options. Please try again.', 'error');
                    });
            } else {
                // Disable and clear member filter dropdowns
                primaryMemberFilter.disabled = true;
                foreignMemberFilter.disabled = true;
                updateMemberDropdown('primary-member-filter', [], true);
                updateMemberDropdown('foreign-member-filter', [], true);
                // Reload table with no filters
                loadMemberLinks();
            }
        }

        // Update add form member dropdowns when cube link is selected
        function updateAddFormMembers() {
            const cubeLinkId = document.getElementById('add-cube-link').value;
            if (cubeLinkId) {
                fetch(`/pybirdai/api/member-links/related-members/${cubeLinkId}/`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            // Update add form dropdowns with all available members
                            updateMemberDropdown('add-primary-member', data.all_members, false);
                            updateMemberDropdown('add-foreign-member', data.all_members, false);
                        } else {
                            showMessage('Error loading members: ' + (data.message || 'Unknown error'), 'error');
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching members for add form:', error);
                        showMessage('Error loading members for add form. Please try again.', 'error');
                    });
            } else {
                // Clear add form member dropdowns
                updateMemberDropdown('add-primary-member', [], false);
                updateMemberDropdown('add-foreign-member', [], false);
            }
        }

        function updateMemberDropdown(selectId, members, isFilter = true) {
            const select = document.getElementById(selectId);
            const currentValue = select.value;

            // Use appropriate placeholder based on context
            const placeholder = isFilter ? 'All' : 'Select...';
            select.innerHTML = `<option value="">${placeholder}</option>`;

            members.forEach(member => {
                const option = document.createElement('option');
                option.value = member;
                option.textContent = member;
                select.appendChild(option);
            });

            // Restore selection if it still exists in new options
            if (currentValue && members.includes(currentValue)) {
                select.value = currentValue;
            }
        }

        function loadMemberLinks() {
            const cubeLinkId = document.getElementById('cube-link-filter').value;
            const primaryMemberId = document.getElementById('primary-member-filter').value;
            const foreignMemberId = document.getElementById('foreign-member-filter').value;

            const params = new URLSearchParams();
            if (cubeLinkId) params.append('cube_structure_item_link', cubeLinkId);
            if (primaryMemberId) params.append('primary_member', primaryMemberId);
            if (foreignMemberId) params.append('foreign_member', foreignMemberId);

            const container = document.getElementById('member-links-container');
            container.classList.add('loading');

            fetch(`/pybirdai/api/member-links/list/?${params.toString()}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    container.classList.remove('loading');
                    if (data.status === 'success') {
                        renderMemberLinksTable(data.links);
                        document.getElementById('member-links-count').textContent = `Total: ${data.count} member link${data.count !== 1 ? 's' : ''}`;
                    } else {
                        showMessage('Error loading member links: ' + (data.message || 'Unknown error'), 'error');
                        renderMemberLinksTable([]);
                    }
                })
                .catch(error => {
                    container.classList.remove('loading');
                    console.error('Error loading member links:', error);
                    showMessage('Error loading member links: ' + error.message, 'error');
                    renderMemberLinksTable([]);
                });
        }

        function renderMemberLinksTable(links) {
            const tbody = document.querySelector('#member-links-table tbody');
            tbody.innerHTML = '';

            if (links.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px; color: #666;">No member links found. Try adjusting the filters or add a new one.</td></tr>';
                return;
            }

            links.forEach(link => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${link.cube_structure_item_link_id}</td>
                    <td>${link.primary_member_id}</td>
                    <td>${link.foreign_member_id}</td>
                    <td>${link.is_linked ? 'Yes' : 'No'}</td>
                    <td>${link.valid_from || '-'}</td>
                    <td>${link.valid_to || '-'}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteMemberLink('${link.cube_structure_item_link_id}', '${link.primary_member_id}', '${link.foreign_member_id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function resetFilters() {
            document.getElementById('cube-link-filter').value = '';
            const primaryMemberFilter = document.getElementById('primary-member-filter');
            const foreignMemberFilter = document.getElementById('foreign-member-filter');
            primaryMemberFilter.innerHTML = '<option value="">All</option>';
            foreignMemberFilter.innerHTML = '<option value="">All</option>';
            primaryMemberFilter.disabled = true;
            foreignMemberFilter.disabled = true;
            loadMemberLinks();
        }

        function showAddForm() {
            document.getElementById('add-link-form').classList.add('visible');
        }

        function hideAddForm() {
            document.getElementById('add-link-form').classList.remove('visible');
            // Reset form
            document.getElementById('add-cube-link').value = '';
            document.getElementById('add-primary-member').innerHTML = '<option value="">Select...</option>';
            document.getElementById('add-foreign-member').innerHTML = '<option value="">Select...</option>';
            document.getElementById('add-is-linked').checked = true;
            document.getElementById('add-valid-from').value = '';
            document.getElementById('add-valid-to').value = '';
        }

        function addMemberLink() {
            const formData = new FormData();
            formData.append('cube_structure_item_link_id', document.getElementById('add-cube-link').value);
            formData.append('primary_member_id', document.getElementById('add-primary-member').value);
            formData.append('foreign_member_id', document.getElementById('add-foreign-member').value);
            formData.append('is_linked', document.getElementById('add-is-linked').checked ? 'true' : 'false');
            formData.append('valid_from', document.getElementById('add-valid-from').value);
            formData.append('valid_to', document.getElementById('add-valid-to').value);

            fetch('/pybirdai/api/member-links/add/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showMessage(data.message, 'success');
                    hideAddForm();
                    loadMemberLinks();
                } else {
                    showMessage('Error: ' + data.message, 'error');
                }
            })
            .catch(error => {
                console.error('Error adding member link:', error);
                showMessage('Error adding member link', 'error');
            });
        }

        function deleteMemberLink(cubeLinkId, primaryMemberId, foreignMemberId) {
            if (!confirm('Are you sure you want to delete this member link?')) {
                return;
            }

            fetch(`/pybirdai/delete-member-link/${cubeLinkId}/${primaryMemberId}/${foreignMemberId}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken,
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    showMessage(data.message, 'success');
                    loadMemberLinks();
                } else {
                    showMessage('Error: ' + data.message, 'error');
                }
            })
            .catch(error => {
                console.error('Error deleting member link:', error);
                showMessage('Error deleting member link', 'error');
            });
        }

        function showMessage(message, type) {
            const messageContainer = document.getElementById('message-container');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            messageContainer.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }

        // Load filter options dynamically
        function loadFilterOptions() {
            // Fetch distinct cube structure item links from API
            fetch('/pybirdai/api/member-links/filter-options/')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // Populate cube structure item link filter
                        const cubeLinkFilter = document.getElementById('cube-link-filter');
                        cubeLinkFilter.innerHTML = '<option value="">All</option>';
                        data.cube_structure_item_links.forEach(link => {
                            const option = document.createElement('option');
                            option.value = link;
                            option.textContent = link;
                            cubeLinkFilter.appendChild(option);
                        });
                    } else {
                        console.warn('No filter options available:', data.message || 'Unknown error');
                    }
                })
                .catch(error => {
                    console.error('Error loading filter options:', error);
                    showMessage('Unable to load filter options. They may be empty.', 'error');
                });
        }

        // Listen for refresh commands from parent (when cube link or structure item link is deleted)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'refresh-member-links') {
                loadMemberLinks();
            }
        });

        // Load member links on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadFilterOptions();
            loadMemberLinks();
        });
    </script>
</body>
</html>
